<!doctype html>
<html>
  <head>
    <title>Place Card</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        margin-top: 50px;
      }

      .box {
        width: 350px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .box img {
        width: 100%;
        height: 220px;
        object-fit: cover;
      }

      .content {
        padding: 15px;
      }

      .content h2 {
        margin: 0;
        color: #333;
      }

      .content p {
        color: #666;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/d/da/Taj-Mahal.jpg"
        alt="Taj Mahal"
      />

      <div class="content">
        <h2>Taj Mahal</h2>

        <p>
          The Taj Mahal is a beautiful white marble monument in Agra, India. It
          was built by Emperor Shah Jahan and is one of the Seven Wonders of the
          World.
        </p>
      </div>
    </div>
  </body>
</html>
