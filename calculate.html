<!doctype html>
<html>
  <head>
    <title>Calculator</title>
    <style>
      .calculator {
        width: 220px;
        margin: 50px auto;
      }

      #display {
        width: 100%;
        height: 40px;
        font-size: 20px;
        text-align: right;
        margin-bottom: 10px;
      }

      button {
        width: 50px;
        height: 50px;
        font-size: 18px;
        margin: 2px;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <input type="text" id="display" readonly />

      <div>
        <button onclick="append('1')">7</button>
        <button onclick="append('2')">8</button>
        <button onclick="append('3')">9</button>
      </div>

      <div>
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
      </div>

      <div>
        <button onclick="append('7')">1</button>
        <button onclick="append('8')">2</button>
        <button onclick="append('9')">3</button>
      </div>

      <div>
        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="append('+')">+</button>
        <button onclick="append('/')">÷</button>
        <button onclick="append('*')">×</button>
        <button onclick="append('-')">−</button>
      </div>

      <div>
        <button onclick="clearDisplay()" style="width: 208px">C</button>
      </div>
    </div>
  </body>
</html>
